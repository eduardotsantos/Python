{% extends "base.html" %}
{% block title %}{{ 'Editar' if expense else 'Nova' }} Despesa - Gestão P&D{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="d-flex align-items-center mb-4">
            <a href="{{ url_for('expenses.list_expenses', project_id=project.id) }}" class="btn btn-outline-secondary btn-sm me-3">
                <i class="bi bi-arrow-left"></i>
            </a>
            <h4 class="fw-bold mb-0">{{ 'Editar' if expense else 'Nova' }} Despesa</h4>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-4">
                <form method="POST">
                    <div class="row g-3">
                        <div class="col-12">
                            <label for="description" class="form-label">Descrição *</label>
                            <input type="text" class="form-control" id="description" name="description"
                                   value="{{ expense.description if expense else '' }}" required>
                        </div>
                        <div class="col-md-6">
                            <label for="category" class="form-label">Categoria *</label>
                            <select class="form-select" id="category" name="category" required>
                                <option value="">Selecione...</option>
                                {% for cat in ['Pessoal', 'Equipamento', 'Material', 'Viagem', 'Serviço Terceiro', 'Outros'] %}
                                <option value="{{ cat }}" {{ 'selected' if expense and expense.category == cat }}>{{ cat }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="amount" class="form-label">Valor (R$) *</label>
                            <input type="number" step="0.01" class="form-control" id="amount" name="amount"
                                   value="{{ expense.amount if expense else '' }}" required data-currency>
                        </div>
                        <div class="col-md-6">
                            <label for="date" class="form-label">Data *</label>
                            <input type="date" class="form-control" id="date" name="date"
                                   value="{{ expense.date.strftime('%Y-%m-%d') if expense and expense.date else '' }}" required>
                        </div>
                        <div class="col-md-6">
                            <label for="status" class="form-label">Status</label>
                            <select class="form-select" id="status" name="status">
                                {% for s in ['Pendente', 'Aprovada', 'Rejeitada', 'Paga'] %}
                                <option value="{{ s }}" {{ 'selected' if expense and expense.status == s }}>{{ s }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="supplier" class="form-label">Fornecedor</label>
                            <input type="text" class="form-control" id="supplier" name="supplier"
                                   value="{{ expense.supplier if expense else '' }}">
                        </div>
                        <div class="col-md-6">
                            <label for="receipt_number" class="form-label">Nº Nota Fiscal</label>
                            <input type="text" class="form-control" id="receipt_number" name="receipt_number"
                                   value="{{ expense.receipt_number if expense else '' }}">
                        </div>
                        <div class="col-12">
                            <label for="notes" class="form-label">Observações</label>
                            <textarea class="form-control" id="notes" name="notes" rows="3">{{ expense.notes if expense else '' }}</textarea>
                        </div>
                    </div>
                    <hr class="my-4">
                    <div class="d-flex justify-content-end gap-2">
                        <a href="{{ url_for('expenses.list_expenses', project_id=project.id) }}" class="btn btn-outline-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg"></i> {{ 'Salvar' if expense else 'Adicionar' }}
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
