{% extends "base.html" %}
{% block title %}Login - Orion Gestao de P&D{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-lg border-0">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <div class="orion-logo mb-3">
                        <i class="bi bi-stars" style="font-size: 3rem; color: #1a2a4a;"></i>
                    </div>
                    <h3 class="mt-2 fw-bold" style="color: #0a1628;">Orion P&D</h3>
                    <p class="text-muted">Sistema de Gestao de Projetos de Pesquisa e Desenvolvimento</p>
                </div>

                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label">Email ou Usuário</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control" id="username" name="username" placeholder="seu@email.com ou usuario" required autofocus>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Senha</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-orion w-100 py-2 mt-2">
                        <i class="bi bi-box-arrow-in-right"></i> Entrar
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
