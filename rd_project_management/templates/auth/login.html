{% extends "base.html" %}
{% block title %}Login - Gestão P&D{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-5 col-lg-4">
        <div class="card shadow-lg border-0">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="bi bi-lightbulb text-primary" style="font-size: 3rem;"></i>
                    <h3 class="mt-2 fw-bold">Gestão P&D</h3>
                    <p class="text-muted">Sistema de Gestão de Projetos de Pesquisa e Desenvolvimento</p>
                </div>

                <form method="POST">
                    <div class="mb-3">
                        <label for="username" class="form-label">Usuário</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-person"></i></span>
                            <input type="text" class="form-control" id="username" name="username" required autofocus>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label for="password" class="form-label">Senha</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="bi bi-lock"></i></span>
                            <input type="password" class="form-control" id="password" name="password" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 mt-2">
                        <i class="bi bi-box-arrow-in-right"></i> Entrar
                    </button>
                </form>

                <div class="text-center mt-4">
                    <span class="text-muted">Não tem conta?</span>
                    <a href="{{ url_for('auth.register') }}" class="text-decoration-none"> Cadastre-se</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
