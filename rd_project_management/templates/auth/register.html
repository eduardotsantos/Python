{% extends "base.html" %}
{% block title %}Cadastro - Gestão P&D{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-5">
        <div class="card shadow-lg border-0">
            <div class="card-body p-5">
                <div class="text-center mb-4">
                    <i class="bi bi-lightbulb text-primary" style="font-size: 3rem;"></i>
                    <h3 class="mt-2 fw-bold">Criar Conta</h3>
                    <p class="text-muted">Cadastre-se no sistema de Gestão P&D</p>
                </div>

                <form method="POST">
                    <div class="mb-3">
                        <label for="full_name" class="form-label">Nome Completo</label>
                        <input type="text" class="form-control" id="full_name" name="full_name" required>
                    </div>
                    <div class="mb-3">
                        <label for="email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="email" name="email" required>
                    </div>
                    <div class="mb-3">
                        <label for="username" class="form-label">Usuário</label>
                        <input type="text" class="form-control" id="username" name="username" required>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label for="password" class="form-label">Senha</label>
                            <input type="password" class="form-control" id="password" name="password" required minlength="6">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label for="confirm_password" class="form-label">Confirmar Senha</label>
                            <input type="password" class="form-control" id="confirm_password" name="confirm_password" required minlength="6">
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary w-100 py-2 mt-2">
                        <i class="bi bi-person-plus"></i> Cadastrar
                    </button>
                </form>

                <div class="text-center mt-4">
                    <span class="text-muted">Já tem conta?</span>
                    <a href="{{ url_for('auth.login') }}" class="text-decoration-none"> Fazer login</a>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
