{% extends "base.html" %}
{% block title %}{{ 'Editar' if entry else 'Novo' }} Registro - Gestão P&D{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="d-flex align-items-center mb-4">
            <a href="{{ url_for('timesheet.list_timesheet', project_id=project.id) }}" class="btn btn-outline-secondary btn-sm me-3">
                <i class="bi bi-arrow-left"></i>
            </a>
            <h4 class="fw-bold mb-0">{{ 'Editar' if entry else 'Registrar' }} Horas</h4>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-4">
                <form method="POST">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label for="date" class="form-label">Data *</label>
                            <input type="date" class="form-control" id="date" name="date"
                                   value="{{ entry.date.strftime('%Y-%m-%d') if entry and entry.date else '' }}" required>
                        </div>
                        <div class="col-md-6">
                            <label for="hours" class="form-label">Horas *</label>
                            <input type="number" step="0.5" min="0.5" max="24" class="form-control" id="hours" name="hours"
                                   value="{{ entry.hours if entry else '' }}" required>
                        </div>
                        <div class="col-12">
                            <label for="activity" class="form-label">Atividade *</label>
                            <input type="text" class="form-control" id="activity" name="activity"
                                   value="{{ entry.activity if entry else '' }}" required
                                   placeholder="Descreva a atividade realizada">
                        </div>
                        <div class="col-md-6">
                            <label for="resource_id" class="form-label">Recurso (Pessoa) *</label>
                            <select class="form-select" id="resource_id" name="resource_id" required>
                                <option value="">Selecione o colaborador</option>
                                {% for r in resources %}
                                <option value="{{ r.id }}" {{ 'selected' if entry and entry.resource_id == r.id }}>{{ r.name }}{% if r.role %} ({{ r.role }}){% endif %}</option>
                                {% endfor %}
                            </select>
                            <div class="form-text">Selecione o colaborador que realizou a atividade</div>
                        </div>
                        <div class="col-md-6">
                            <label for="milestone_id" class="form-label">Marco/Etapa Relacionada</label>
                            <select class="form-select" id="milestone_id" name="milestone_id">
                                <option value="">Nenhum</option>
                                {% for m in milestones %}
                                <option value="{{ m.id }}" {{ 'selected' if entry and entry.milestone_id == m.id }}>{{ m.title }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-12">
                            <label for="notes" class="form-label">Observações</label>
                            <textarea class="form-control" id="notes" name="notes" rows="3">{{ entry.notes if entry else '' }}</textarea>
                        </div>
                    </div>
                    <hr class="my-4">
                    <div class="d-flex justify-content-end gap-2">
                        <a href="{{ url_for('timesheet.list_timesheet', project_id=project.id) }}" class="btn btn-outline-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg"></i> {{ 'Salvar' if entry else 'Registrar' }}
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
