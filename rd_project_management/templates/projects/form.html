{% extends "base.html" %}
{% block title %}{{ 'Editar' if project else 'Novo' }} Projeto - Gestão P&D{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-8">
        <div class="d-flex align-items-center mb-4">
            <a href="{{ url_for('projects.list_projects') }}" class="btn btn-outline-secondary btn-sm me-3">
                <i class="bi bi-arrow-left"></i>
            </a>
            <h4 class="fw-bold mb-0">{{ 'Editar' if project else 'Novo' }} Projeto</h4>
        </div>

        <div class="card shadow-sm">
            <div class="card-body p-4">
                <form method="POST">
                    <div class="row g-3">
                        <div class="col-md-4">
                            <label for="code" class="form-label">Código do Projeto *</label>
                            <input type="text" class="form-control" id="code" name="code"
                                   value="{{ project.code if project else '' }}" required
                                   placeholder="Ex: PD-2024-001">
                        </div>
                        <div class="col-md-8">
                            <label for="title" class="form-label">Título *</label>
                            <input type="text" class="form-control" id="title" name="title"
                                   value="{{ project.title if project else '' }}" required>
                        </div>
                        <div class="col-12">
                            <label for="description" class="form-label">Descrição</label>
                            <textarea class="form-control" id="description" name="description" rows="4">{{ project.description if project else '' }}</textarea>
                        </div>
                        <div class="col-md-6">
                            <label for="category" class="form-label">Categoria</label>
                            <select class="form-select" id="category" name="category">
                                <option value="">Selecione...</option>
                                {% set categories = ['Pesquisa Básica', 'Pesquisa Aplicada', 'Desenvolvimento Experimental', 'Inovação Tecnológica', 'Inovação de Processo'] %}
                                {% for cat in categories %}
                                <option value="{{ cat }}" {{ 'selected' if project and project.category == cat }}>{{ cat }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="status" class="form-label">Status</label>
                            <select class="form-select" id="status" name="status">
                                {% set statuses = ['Planejamento', 'Em Andamento', 'Concluído', 'Cancelado'] %}
                                {% for s in statuses %}
                                <option value="{{ s }}" {{ 'selected' if project and project.status == s }}>{{ s }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-4">
                            <label for="start_date" class="form-label">Data Início</label>
                            <input type="date" class="form-control" id="start_date" name="start_date"
                                   value="{{ project.start_date.strftime('%Y-%m-%d') if project and project.start_date else '' }}">
                        </div>
                        <div class="col-md-4">
                            <label for="end_date" class="form-label">Data Término</label>
                            <input type="date" class="form-control" id="end_date" name="end_date"
                                   value="{{ project.end_date.strftime('%Y-%m-%d') if project and project.end_date else '' }}">
                        </div>
                        <div class="col-md-4">
                            <label for="budget" class="form-label">Orçamento (R$)</label>
                            <input type="number" step="0.01" class="form-control" id="budget" name="budget"
                                   value="{{ project.budget if project else '0.00' }}" data-currency>
                        </div>
                        <div class="col-md-6">
                            <label for="funding_source" class="form-label">Fonte de Recursos</label>
                            <select class="form-select" id="funding_source" name="funding_source">
                                <option value="">Selecione...</option>
                                {% set sources = ['Recursos Próprios', 'FINEP', 'BNDES', 'CNPq', 'CAPES', 'FAPESP', 'Embrapii', 'Lei do Bem', 'Lei de Informática', 'Misto'] %}
                                {% for src in sources %}
                                <option value="{{ src }}" {{ 'selected' if project and project.funding_source == src }}>{{ src }}</option>
                                {% endfor %}
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label for="responsible_id" class="form-label">Responsável</label>
                            <select class="form-select" id="responsible_id" name="responsible_id">
                                {% for user in users %}
                                <option value="{{ user.id }}" {{ 'selected' if project and project.responsible_id == user.id }}>{{ user.full_name }}</option>
                                {% endfor %}
                            </select>
                        </div>
                    </div>

                    <hr class="my-4">
                    <div class="d-flex justify-content-end gap-2">
                        <a href="{{ url_for('projects.list_projects') }}" class="btn btn-outline-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-check-lg"></i> {{ 'Salvar Alterações' if project else 'Criar Projeto' }}
                        </button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
